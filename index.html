<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brief News App</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: white;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        header {
            position: sticky;
            top: 0;
            background-color: #1a1a1a;
            padding: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #ff4757;
        }
        .logo {
            font-size: 24px;
            font-weight: bold;
        }
        .header-icons { 
            display: flex;
            gap: 10px;
        }
        .api-banner {
            background-color: #28a745;
            color: white;
            padding: 10px;
            text-align: center;
        }
        .categories {
            margin: 20px 0;
            display: flex;
            gap: 10px;
        }
        .category {
            padding: 10px 15px;
            background-color: #ff4757;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }
        .category.active {
            background-color: red;
        }
        .news-card {
            background: linear-gradient(to right, #2c3e50, #34495e);
            border-radius: 8px;
            padding: 20px;
            margin: 10px 0;
        }
        .news-card img {
            max-width: 100%;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">Brief</div>
        <div class="header-icons">
            <span class="search-icon">🔍</span>
            <span class="settings-icon">⚙️</span>
        </div>
    </header>
    <div class="api-banner">
        API key saved. <a href="#">Change</a>
    </div>
    <div class="categories">
        <div class="category active">🔥 Top News</div>
        <div class="category">India</div>
        <div class="category">World</div>
        <div class="category">Tech</div>
    </div>
    <div class="news-container">
        <div class="news-card">
            <img src="placeholder.jpg" alt="News">
            <h3>Headline</h3>
            <p>Description of the news goes here.</p>
            <p>Source: XYZ News | Time: 2 hours ago | Views: 100</p>
        </div>
        <!-- Repeat news-card for more articles -->
    </div>
</body>
</html>
